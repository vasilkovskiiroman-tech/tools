.name-block input:focus, .name-block select:focus{border-color:var(--accent)}
.name-block select option{background:#1a1d27;color:#e8eaf6}

.progress-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px}
.progress-bar-outer{flex:1;height:6px;background:var(--surface2);border-radius:999px;overflow:hidden}
.progress-bar-inner{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;width:0%;transition:width .4s}

.q-hint{font-size:12px;color:var(--muted);margin-bottom:16px;font-style:italic}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;cursor:pointer;transition:all .18s;user-select:none}

.radio-btn{width:18px;height:18px;cursor:pointer;accent-color:var(--accent)}

  // таблица всегда одна (вопрос 10)
  document.getElementById('progressLabel').textContent = `0 / ${totalQ}`;

  allQ.forEach((q,idx)=>{
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-'+q.id;

    if(q.type === 'table'){
      card.innerHTML = `
        <div class="q-num">Вопрос ${q.num}</div>
        <div class="q-text">${q.text}</div>
        <div class="q-hint">${q.hint}</div>
        <table class="table-q">
          <thead>
            <tr>
              <th>Источник дохода</th>
              <th>Очень важно</th>
              <th>Не очень важно</th>
              <th>Совсем не важно</th>
            </tr>
          </thead>
          <tbody>
            ${q.rows.map((row,ri)=>`
              <tr>
                <td>${ri+1}. ${row}</td>
                <td><input type="radio" class="radio-btn" name="r10_${ri}" value="1" onchange="selectTable(${ri},1)"></td>
                <td><input type="radio" class="radio-btn" name="r10_${ri}" value="2" onchange="selectTable(${ri},2)"></td>
                <td><input type="radio" class="radio-btn" name="r10_${ri}" value="3" onchange="selectTable(${ri},3)"></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    } else {
      const letters = ['А','Б','В','Г','Д','Е','Ж','З'];
      card.innerHTML = `
        <div class="q-num">Вопрос ${q.num}</div>
        <div class="q-text">${q.text}</div>
        <div class="q-hint">${q.hint}</div>
        <div class="options">
          ${q.opts.map((opt,oi)=>`
            <div class="option" id="opt-${q.id}-${oi}" onclick="selectOption('${q.id}',${oi},${q.multi})">
              <div class="opt-letter">${letters[oi]}</div>
              <div class="opt-text">${opt}</div>
            </div>
          `).join('')}
        </div>
      `;
    }
    container.appendChild(card);
  });

  // Сбросить ответы
  answers = {};
  answers10 = {};
  updateProgress();
}

function selectOption(qId, optIdx, multi){
  if(!answers[qId]) answers[qId] = [];

  if(!multi){
    answers[qId] = [optIdx];
    // Снять все
    document.querySelectorAll(`[id^="opt-${qId}-"]`).forEach(el=>el.classList.remove('selected'));
    document.getElementById(`opt-${qId}-${optIdx}`).classList.add('selected');
  } else {
    const pos = answers[qId].indexOf(optIdx);
    if(pos === -1){
      if(answers[qId].length < 2) answers[qId].push(optIdx);
      else return; // максимум 2
    } else {
      answers[qId].splice(pos,1);
    }
    document.getElementById(`opt-${qId}-${optIdx}`).classList.toggle('selected', answers[qId].includes(optIdx));
  }

  const card = document.getElementById('card-'+qId);
  if(card) card.classList.toggle('answered', answers[qId].length > 0);
  updateProgress();
}

function selectTable(rowIdx, colVal){
  answers10[rowIdx] = colVal;
  const card = document.getElementById('card-10');
  if(card) card.classList.toggle('answered', Object.keys(answers10).length === 9);
  updateProgress();
}

function updateProgress(){
  const role = document.getElementById('userRole').value;
  let done = 0;

  // Проверяем обычные вопросы
  QUESTIONS.forEach(q=>{
    if(q.type === 'table'){
      if(Object.keys(answers10).length === 9) done++;
    } else {
      if(answers[q.id] && answers[q.id].length > 0) done++;
    }
  });

  // Вопрос 18
  if(role){
    const q18id = role === 'supervisor' ? '18r' : '18n';
    if(answers[q18id] && answers[q18id].length > 0) done++;
  }

  const pct = totalQ > 0 ? (done/totalQ*100) : 0;
  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `${done} / ${totalQ}`;

  const allDone = done === totalQ && totalQ > 0;
  document.getElementById('btnSubmit').disabled = !allDone;
}

function calcScores(){
  const scores = {ИН:0, ПР:0, ПА:0, ХО:0, ЛЮ:0};

  // Вопросы 5-9, 11-17
  Object.entries(answers).forEach(([qId, selected])=>{
    const key = KEY[qId] || KEY[parseInt(qId)];
    if(!key) return;
    selected.forEach(optIdx=>{
      const type = key[optIdx+1]; // ответы с 1
      if(type && scores[type] !== undefined) scores[type]++;
    });
  });

  // Вопрос 10
  Object.entries(answers10).forEach(([rowIdx, col])=>{
    if(col === 1){ // только "очень важно" даёт очко
      const type = KEY10[parseInt(rowIdx)+1]?.[1];
      if(type && scores[type] !== undefined) scores[type]++;
    }
  });

  // Вопрос 18
  const role = document.getElementById('userRole').value;
  const q18id = role === 'supervisor' ? '18r' : '18n';
  const q18key = KEY['18r'] || {};
  const q18nkey = KEY['18n'] || {};
  const activeKey = role === 'supervisor' ? KEY['18r'] : KEY['18n'];
  if(answers[q18id]){
    answers[q18id].forEach(optIdx=>{
      const type = activeKey[optIdx+1];
      if(type && scores[type] !== undefined) scores[type]++;
    });
  }

  return scores;
}

function getMainType(scores){
  const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  return sorted[0][0];
}

const TYPE_NAMES = {
  ИН: 'Инструментальный',
  ПР: 'Профессиональный',
  ПА: 'Патриотический',
  ХО: 'Хозяйский',
  ЛЮ: 'Люмпенизированный'
};

function submitTest(){
  const name = document.getElementById('userName').value.trim();
  const role = document.getElementById('userRole').value;
  if(!name || !role) return;

  document.getElementById('form-section').style.display='none';
  document.getElementById('result').style.display='block';

  const scores = calcScores();
  const main = getMainType(scores);
  const total = Object.values(scores).reduce((a,b)=>a+b,0);

  const pctStr = Object.entries(scores)
    .sort((a,b)=>b[1]-a[1])
    .map(([t,v])=> t+' '+Math.round(v/(total||1)*100)+'%')
    .join(' · ');

  const roleStr = role === 'supervisor' ? 'Супервайзер' : 'Промоутер/Эксперт';

  fetch(SCRIPT_URL,{
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      test: 'Герчиков',
      name, role: roleStr,
      mainType: TYPE_NAMES[main],
      typeCode: main,
      percents: pctStr,
      ИН: scores.ИН, ПР: scores.ПР, ПА: scores.ПА, ХО: scores.ХО, ЛЮ: scores.ЛЮ,
      date: new Date().toLocaleString('ru-RU')
    })
  }).catch(()=>{});
}

// Инициализация — перестраивать вопросы при смене роли
document.getElementById('userRole').addEventListener('change', buildQuestions);
</script>
